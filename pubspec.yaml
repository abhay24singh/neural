publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_background_service: ^5.0.5 
  flutter_local_notifications: ^17.2.1
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  http: ^1.6.0
